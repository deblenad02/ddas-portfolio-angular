<div class="profile-card">
  <div class="profile-card__top">
    <div class="profile-image-wrapper">
      <img
        class="profile-image"
        [src]="profile.imageUrl"
        [alt]="profile.name"
      />
    </div>

    <div class="profile-intro">
      <h1 class="profile-name">{{ profile.name }}</h1>
      <p class="profile-title">{{ profile.title }}</p>
      @if (profile.subtitle) {
        <p class="profile-subtitle">{{ profile.subtitle }}</p>
      }
    </div>
  </div>

  <div class="profile-divider"></div>

  <div class="profile-details">
    <a class="profile-link" [href]="'mailto:' + profile.email">
      <span class="profile-link__label">Email</span>
      <span class="profile-link__value">{{ profile.email }}</span>
    </a>

    <a class="profile-link" [href]="'tel:' + profile.phone">
      <span class="profile-link__label">Phone</span>
      <span class="profile-link__value">{{ profile.phone }}</span>
    </a>

    <div class="profile-link profile-link--static">
      <span class="profile-link__label">Location</span>
      <span class="profile-link__value">{{ profile.location }}</span>
    </div>

    <a class="profile-link" [href]="profile.linkedinUrl" target="_blank" rel="noopener noreferrer">
      <span class="profile-link__label">LinkedIn</span>
      <span class="profile-link__value">View Profile</span>
    </a>

    <a class="profile-link" [href]="profile.githubUrl" target="_blank" rel="noopener noreferrer">
      <span class="profile-link__label">GitHub</span>
      <span class="profile-link__value">View Repositories</span>
    </a>
  </div>
</div>
